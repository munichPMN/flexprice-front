# White-label deployment workflow.
#
# The deployment list lives entirely in one GitHub secret: DEPLOYMENTS_CONFIG
# Add / remove / update tenants by editing that secret — no code change needed.
#
# DEPLOYMENTS_CONFIG format (JSON array):
#   [
#     {
#       "name": "flexprice-in",
#       "vercel_project_id": "prj_xxxx",
#       "vercel_token": "",          <- empty = fall back to shared VERCEL_TOKEN
#       "vercel_org_id": ""          <- empty = fall back to shared VERCEL_ORG_ID
#     },
#     {
#       "name": "tirdad",
#       "vercel_project_id": "prj_yyyy",
#       "vercel_token": "tok_abc123",
#       "vercel_org_id": "team_abc123"
#     }
#   ]
#
# Required GitHub secrets:
#   DEPLOYMENTS_CONFIG   — JSON array above
#   VERCEL_TOKEN         — shared fallback token
#   VERCEL_ORG_ID        — shared fallback org
#   SENTRY_AUTH_TOKEN

name: White-Label Production Deployment

on:
  push:
    branches:
      - main

jobs:
  # Reads DEPLOYMENTS_CONFIG and exposes it as a matrix for the deploy job.
  # (secrets context is not available in strategy.matrix, so we bridge via outputs)
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: echo "matrix=$DEPLOYMENTS_CONFIG" >> "$GITHUB_OUTPUT"
        env:
          DEPLOYMENTS_CONFIG: ${{ secrets.DEPLOYMENTS_CONFIG }}

  deploy:
    needs: setup
    name: Deploy / ${{ matrix.deployment.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deployment: ${{ fromJSON(needs.setup.outputs.matrix) }}

    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Resolve Vercel credentials
        run: |
          echo "VERCEL_TOKEN=${_TOKEN:-$_FB_TOKEN}"     >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${_ORG:-$_FB_ORG}"       >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$_PROJECT_ID"         >> "$GITHUB_ENV"
        env:
          _TOKEN:      ${{ matrix.deployment.vercel_token }}
          _ORG:        ${{ matrix.deployment.vercel_org_id }}
          _PROJECT_ID: ${{ matrix.deployment.vercel_project_id }}
          _FB_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          _FB_ORG:     ${{ secrets.VERCEL_ORG_ID }}

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Install dependencies
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install

      - name: Generate Version Meta
        run: npm run generate-meta

      - name: Build Project Artifacts
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
