# Generic white-label deployment workflow.
#
# To add a new deployment, append one record to the matrix below — no new file needed.
# White-label env vars (VITE_BRAND_CONFIG, VITE_AUTH_CONFIG, VITE_DEFAULT_LOCALE, …)
# are managed in each Vercel project's Environment Variables settings and pulled
# automatically by the "vercel pull" step.
#
# Credential resolution:
#   - Provide a secret name to use a deployment-specific credential.
#   - Leave "" to fall back to the shared Flexprice secret (VERCEL_TOKEN / VERCEL_ORG_ID).
#
# Required GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, SENTRY_AUTH_TOKEN
# Per-deployment secrets:  VERCEL_PROJECT_ID_<NAME>  (and optionally TOKEN/ORG overrides)

name: White-Label Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy / ${{ matrix.deployment.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deployment:
          - name: flexprice-in
            vercel_project_id_secret: VERCEL_PROJECT_ID_IN
            vercel_org_id_secret: ""
            vercel_token_secret: ""

          - name: flexprice-us
            vercel_project_id_secret: VERCEL_PROJECT_ID_US
            vercel_org_id_secret: ""
            vercel_token_secret: ""

          # ── Add a new white-label deployment ─────────────────────────────
          # - name: acme
          #   vercel_project_id_secret: VERCEL_PROJECT_ID_ACME
          #   vercel_org_id_secret: ""   # or VERCEL_ORG_ID_ACME
          #   vercel_token_secret: ""    # or VERCEL_TOKEN_ACME

    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Resolve Vercel credentials
        env:
          _TOKEN:      ${{ secrets[matrix.deployment.vercel_token_secret] }}
          _ORG_ID:     ${{ secrets[matrix.deployment.vercel_org_id_secret] }}
          _PROJECT_ID: ${{ secrets[matrix.deployment.vercel_project_id_secret] }}
          _FB_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          _FB_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
        run: |
          echo "VERCEL_TOKEN=${_TOKEN:-$_FB_TOKEN}"      >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${_ORG_ID:-$_FB_ORG_ID}"  >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$_PROJECT_ID"          >> "$GITHUB_ENV"

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Install dependencies
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm install

      - name: Generate Version Meta
        run: npm run generate-meta

      - name: Build Project Artifacts
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}
